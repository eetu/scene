<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>puae-wasm JIT runtime harness</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f0f0f;
        color: #eee;
        font:
          13px/1.5 ui-monospace,
          Menlo,
          monospace;
      }
      #wrap {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      #hud {
        padding: 6px 10px;
        background: #161616;
        border-bottom: 1px solid #262626;
        white-space: pre-wrap;
      }
      #hud b {
        color: #f78f08;
      }
      .ok {
        color: #2ecc40;
      }
      .bad {
        color: #ff4136;
      }
      #game {
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="hud">loading…</div>
      <div id="game"></div>
    </div>
    <script type="module">
      // M1 JIT runtime harness. Boots the JIT-scaffolding core (non-threaded, so
      // its Module lives on THIS thread and we can reach wasmTable/wasmMemory +
      // the jit_* ABI), then installs the ejsJitGet self-test the moment the core
      // Module is up. The EM_JS hook in m68k_run_2_020 calls ejsJitGet(pc) every
      // instruction; the first call runs the substrate self-test.
      import { installSelfTest, installProbe, installJit, installJitChained } from "./runtime.mjs";

      const hud = document.getElementById("hud");
      const W = window;
      const Q = new URLSearchParams(location.search);
      const setHud = (html) => (hud.innerHTML = html);

      // Force preserveDrawingBuffer so the effectiveFps canvas-hash can read the
      // emulator's WebGL output (same trick as bench/index.html). Must run before
      // the core creates its context.
      const _getContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function (type, attrs) {
        if (type === "webgl" || type === "webgl2" || type === "experimental-webgl")
          attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
        return _getContext.call(this, type, attrs);
      };

      async function main() {
        const cfg = await fetch("/config.json").then((r) => r.json());

        // Accelerated AGA path, 68030/normal → dispatches to m68k_run_2_020,
        // where the M1 hook lives. Overridable via ?cpu=/?compat=.
        const opts = {
          "virtual-gamepad": "disabled",
          puae_model: Q.get("model") || "A1200",
          puae_cpu_model: Q.get("cpu") || "68030",
          puae_cpu_compatibility: Q.get("compat") || "normal",
          puae_immediate_blits: "immediate",
          puae_fastmem_size: "8",
          puae_collision_level: "none",
          ...cfg.options,
        };

        W.EJS_player = "#game";
        W.EJS_pathtodata = "/vendor/emulatorjs/";
        W.EJS_core = "amiga";
        W.EJS_gameUrl = cfg.gameUrl;
        W.EJS_biosUrl = cfg.biosUrl;
        W.EJS_startOnLoaded = true;
        W.EJS_language = "en";
        // Non-threaded by default (Module on this thread for the JIT); ?threads=1
        // forces the threaded core (to A/B HDF mounting).
        W.EJS_threads = Q.get("threads") === "1" && W.crossOriginIsolated === true;
        W.EJS_volume = 0;
        W.EJS_color = "#f78f08";
        W.EJS_backgroundColor = "#0f0f0f";
        W.EJS_defaultOptions = opts;

        // Fast-forward control (drive.mjs warps past the HD boot to the effect).
        W.__setFF = (on, ratio) => {
          const gm = W.EJS_emulator && W.EJS_emulator.gameManager;
          if (!gm || !gm.toggleFastForward) return false;
          if (on) {
            if (ratio != null && gm.setFastForwardRatio) gm.setFastForwardRatio(ratio);
            gm.toggleFastForward(1);
          } else gm.toggleFastForward(0);
          return true;
        };

        const s = document.createElement("script");
        s.src = "/vendor/emulatorjs/loader.js";
        document.body.appendChild(s);

        attachWhenReady();
        poll();
      }

      // Reach the core Module (EmulatorJS stores it at gameManager.Module) and
      // install the self-test as soon as the jit ABI + table are present.
      function attachWhenReady() {
        const t0 = performance.now();
        const iv = setInterval(() => {
          const gm = W.EJS_emulator && W.EJS_emulator.gameManager;
          const M = gm && gm.Module;
          if (M && M._jit_abi_regs && M.wasmTable && M.wasmMemory) {
            clearInterval(iv);
            W.__M = M; // for reading M3 instruction counters in poll()
            try {
              const mode = Q.get("mode") || "selftest";
              if (mode === "off") {
                // pure interpreter baseline — install nothing
              } else if (mode === "probe") installProbe(M);
              else if (mode === "jit") installJit(M, { gate: Q.get("gate") !== "0" });
              else if (mode === "jit3")
                installJitChained(M, {
                  gate: Q.get("gate") !== "0",
                  ramMax: Q.get("rammax") ? parseInt(Q.get("rammax"), 16) >>> 0 : undefined,
                });
              else installSelfTest(M);
              W.__jitStatus = "installed:" + mode;
            } catch (e) {
              W.__jitStatus = "install-error: " + e;
            }
          } else if (performance.now() - t0 > 60000) {
            clearInterval(iv);
            W.__jitStatus = "core-module-not-found";
          }
        }, 100);
      }

      function poll() {
        const gm = () => W.EJS_emulator && W.EJS_emulator.gameManager;

        // effectiveFps: hash the emulator canvas each host frame; count distinct
        // frames over a ~2s window (the real animation-rate / lag metric).
        const probe = document.createElement("canvas");
        probe.width = 96;
        probe.height = 72;
        const pctx = probe.getContext("2d", { willReadFrequently: true });
        const emuCanvas = () => document.querySelector("#game canvas");
        let lastHash = null,
          distinct = 0,
          hashOk = false;
        const eWin = [];
        function hashFrame() {
          const c = emuCanvas();
          if (!c || !c.width) return;
          try {
            pctx.drawImage(c, 0, 0, probe.width, probe.height);
          } catch {
            return;
          }
          const d = pctx.getImageData(0, 0, probe.width, probe.height).data;
          let h = 2166136261 >>> 0;
          for (let i = 0; i < d.length; i += 53) {
            h = (h ^ d[i]) >>> 0;
            h = Math.imul(h, 16777619) >>> 0;
          }
          hashOk = true;
          if (h !== lastHash) distinct++;
          lastHash = h;
        }
        function tick() {
          hashFrame();
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        let vAnchor = null;
        const vWin = [];
        setInterval(() => {
          const g = gm();
          const frame = g && g.getFrameNum ? g.getFrameNum() : null;
          const st = W.__jitStatus || "booting";
          const t = W.__jitSelfTest;
          const pr = W.__jitProbe;
          const js = W.__jitStats;
          const M = W.__M;
          const insnTotal = M && M._jit_insn_total ? M._jit_insn_total() : null;
          const insnJit = M && M._jit_insn_jit ? M._jit_insn_jit() : null;
          const now = performance.now();

          eWin.push({ t: now, d: distinct });
          while (eWin.length > 2 && now - eWin[0].t > 2000) eWin.shift();
          const eDt = (now - eWin[0].t) / 1000;
          const effectiveFps = eDt > 0.25 ? +((distinct - eWin[0].d) / eDt).toFixed(1) : 0;

          let vblankFps = 0;
          if (typeof frame === "number" && frame >= 0) {
            vWin.push({ t: now, f: frame });
            while (vWin.length > 2 && now - vWin[0].t > 2000) vWin.shift();
            const vDt = (now - vWin[0].t) / 1000;
            vblankFps = vDt > 0.25 ? +((frame - vWin[0].f) / vDt).toFixed(1) : 0;
          }

          W.__hud = {
            frame,
            status: st,
            effectiveFps,
            vblankFps,
            hashOk,
            insnTotal,
            insnJit,
            selfTest: t || null,
            probe: pr || null,
            jitStats: js || null,
          };
          let line =
            `<b>JIT runtime harness</b>  core:${st}  frame:${frame}` +
            `  <b>effective ${effectiveFps} fps</b>  vblank ${vblankFps}` +
            (hashOk ? "" : `  <span class="bad">[canvas unreadable]</span>`);
          if (js)
            line += `\n  jit: ${js.activated} active / ${js.compiled} compiled / ${js.gateFail} gateFail / ${js.empty} empty / ${js.decodeFail} decErr (${js.blocks} pcs)`;
          if (pr) {
            line +=
              `\n  probe: ${pr.uniqueProbed} blocks  decoderCoverage ${pr.decoderCoverage}%` +
              `  avgLen ${pr.avgBlockLen}  topMiss: ` +
              (pr.topMissFamilies[0]
                ? `${pr.topMissFamilies[0].family} (${pr.topMissFamilies[0].n})`
                : "—");
          }
          if (t) {
            const cls = t.pass ? "ok" : "bad";
            line +=
              `\n  self-test: <span class="${cls}">${t.pass ? "PASS ✅" : "FAIL ❌"}</span>` +
              `  slot ${t.tableSlot}  ret ${t.blockReturned}  firstPc 0x${(t.firstPc || 0).toString(16)}` +
              (t.mismatches && t.mismatches.length
                ? `\n  mismatch: ${t.mismatches.join(", ")}`
                : "") +
              (t.error ? `\n  <span class="bad">error: ${t.error}</span>` : "");
          }
          setHud(line);
        }, 300);
      }

      main().catch((e) => setHud(`<span class="bad">error: ${e}</span>`));
    </script>
  </body>
</html>
