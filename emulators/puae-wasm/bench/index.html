<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>puae-wasm bench</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f0f0f;
        color: #eee;
        font:
          13px/1.4 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }
      #wrap {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      #hud {
        padding: 6px 10px;
        background: #161616;
        border-bottom: 1px solid #262626;
        white-space: pre;
      }
      #hud b {
        color: #f78f08;
      }
      #hud .bad {
        color: #ff4136;
      }
      #hud .ok {
        color: #2ecc40;
      }
      #game {
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="hud">loading config…</div>
      <div id="game"></div>
    </div>
    <script>
      // Phase-0 baseline harness. Reports TWO fps signals, because they mean
      // different things:
      //   • effectiveFps — distinct rendered frames/sec (we hash the actual
      //     emulator canvas each host frame). This is the REAL lag metric: a
      //     demo written for an '030 that starves on an emulated '020 updates
      //     its effect every few vblanks, so effectiveFps drops even though…
      //   • vblankFps   — the core's get_current_frame_count (Amiga 50 Hz PAL).
      //     The core holds this at ~50 as long as the HOST keeps realtime, so it
      //     stays 50 even when the demo is visibly laggy — it only dips if the
      //     host itself can't emulate fast enough.
      // Comparing them tells us the regime: vblank≈50 & effective<50 → guest CPU
      // too slow (cure = faster CPU MODEL, no JIT). vblank<50 → host can't keep
      // up (JIT / video-fallback territory).
      const hud = document.getElementById("hud");
      const W = window;
      const Q = new URLSearchParams(location.search);

      // Force preserveDrawingBuffer on the emulator's WebGL context (done BEFORE
      // the core loads). Without it, drawImage()/readback off the canvas returns
      // a cleared buffer, so our frame-hash would never change — this is what
      // makes the effectiveFps metric actually measurable.
      const _getContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function (type, attrs) {
        if (type === "webgl" || type === "webgl2" || type === "experimental-webgl") {
          attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
        }
        return _getContext.call(this, type, attrs);
      };

      async function main() {
        const cfg = await fetch("/config.json").then((r) => r.json());

        // Base = EjsEmulator.svelte's accelerated (non-"Accurate") AGA path.
        // Every knob is overridable via ?key=val so measure.mjs can A/B the CPU
        // model (the fs-uae "enable 030" finding) without editing this file.
        const opts = {
          "virtual-gamepad": "disabled",
          puae_model: Q.get("model") || "A1200",
          puae_cpu_model: Q.get("cpu") || "68030",
          puae_cpu_compatibility: Q.get("compat") || "normal",
          puae_immediate_blits: Q.get("blits") || "immediate",
          puae_fastmem_size: Q.get("fastmem") || "8",
          puae_collision_level: "none",
          ...cfg.options,
        };
        if (Q.get("ce")) opts.puae_cpu_cycle_exact = Q.get("ce");

        W.EJS_player = "#game";
        W.EJS_pathtodata = "/vendor/emulatorjs/";
        W.EJS_core = "amiga";
        W.EJS_gameUrl = cfg.gameUrl; // basename carries "(AGA)" for PUAE detection
        W.EJS_biosUrl = cfg.biosUrl; // kick40068.A1200
        W.EJS_startOnLoaded = true; // auto-start for an unattended baseline
        W.EJS_language = "en";
        W.EJS_threads = W.crossOriginIsolated === true; // needs COOP/COEP
        W.EJS_volume = 0; // silent baseline
        W.EJS_color = "#f78f08";
        W.EJS_backgroundColor = "#0f0f0f";
        W.EJS_defaultOptions = opts;
        W.__cfg = { ...cfg, opts };

        // Fast-forward control so a driver can warp past the HD boot + static
        // intro, then drop back to 1× to measure the true (host-bound) lag.
        // ratio 0 = unlimited (as fast as the host manages); N = N×.
        W.__setFF = (on, ratio) => {
          const gm = W.EJS_emulator && W.EJS_emulator.gameManager;
          if (!gm || !gm.toggleFastForward) return false;
          if (on) {
            if (ratio != null && gm.setFastForwardRatio) gm.setFastForwardRatio(ratio);
            gm.toggleFastForward(1);
          } else {
            gm.toggleFastForward(0);
          }
          return true;
        };

        const s = document.createElement("script");
        s.src = "/vendor/emulatorjs/loader.js";
        document.body.appendChild(s);

        sample(cfg, opts);
      }

      function sample(cfg, opts) {
        const TARGET = cfg.targetFps || 50;
        const gm = () => W.EJS_emulator && W.EJS_emulator.gameManager;

        // Canvas hasher for effectiveFps: downscale the emulator canvas into a
        // tiny 2D probe and hash the pixels; count how many host frames produce
        // a DISTINCT image = how many real frames the demo actually painted.
        const probe = document.createElement("canvas");
        probe.width = 96;
        probe.height = 72;
        const pctx = probe.getContext("2d", { willReadFrequently: true });
        const emuCanvas = () => document.querySelector("#game canvas");
        function hashFrame() {
          const c = emuCanvas();
          if (!c || !c.width) return null;
          try {
            pctx.drawImage(c, 0, 0, probe.width, probe.height);
          } catch {
            return null; // tainted/unreadable
          }
          const d = pctx.getImageData(0, 0, probe.width, probe.height).data;
          let h = 2166136261 >>> 0;
          for (let i = 0; i < d.length; i += 53) {
            h = (h ^ d[i]) >>> 0;
            h = Math.imul(h, 16777619) >>> 0;
          }
          return h;
        }

        let vAnchor = null; // {t,f} for vblank fps
        let lastHash = null;
        let distinct = 0; // cumulative distinct canvas frames
        let hashOk = false; // did we ever read a non-null hash?
        const win = []; // rolling window for instantaneous vblank fps
        const eWin = []; // rolling window {t, distinct} for effective fps
        const t0 = performance.now();

        function tick() {
          const now = performance.now();
          const g = gm();
          const f = g && g.getFrameNum ? g.getFrameNum() : null;

          const h = hashFrame();
          if (h !== null) {
            hashOk = true;
            if (h !== lastHash) distinct++;
            lastHash = h;
          }
          // Rolling ~2s window so effectiveFps tracks the CURRENT animation rate
          // (a static intro reads ~0; the animated part reads its true fps) —
          // not a lifetime average that the static phase would drag down.
          eWin.push({ t: now, d: distinct });
          while (eWin.length > 2 && now - eWin[0].t > 2000) eWin.shift();
          const eDt = (now - eWin[0].t) / 1000;
          const effectiveFps = eDt > 0.25 ? (distinct - eWin[0].d) / eDt : 0;

          let vInst = 0,
            vAvg = 0;
          if (typeof f === "number" && f >= 0) {
            if (!vAnchor) vAnchor = { t: now, f };
            win.push({ t: now, f });
            while (win.length > 2 && now - win[0].t > 2000) win.shift();
            const first = win[0];
            const dt = (now - first.t) / 1000;
            vInst = dt > 0.25 ? (f - first.f) / dt : 0;
            const totDt = (now - vAnchor.t) / 1000;
            vAvg = totDt > 0 ? (f - vAnchor.f) / totDt : 0;
          }

          W.__bench = {
            effectiveFps: +effectiveFps.toFixed(1), // REAL lag metric
            vblankFps: +vInst.toFixed(1), // ~50 while host keeps realtime
            vblankAvg: +vAvg.toFixed(1),
            frame: typeof f === "number" ? f : null,
            distinct,
            hashOk,
            elapsed: +((now - t0) / 1000).toFixed(1),
            isolated: W.crossOriginIsolated === true,
            threads: W.EJS_threads === true,
            target: TARGET,
            opts,
          };

          if (typeof f === "number") {
            const cls =
              effectiveFps >= TARGET * 0.9 ? "ok" : effectiveFps < TARGET * 0.6 ? "bad" : "";
            hud.innerHTML =
              `<b>effective <span class="${cls}">${effectiveFps.toFixed(1)} fps</span></b>` +
              `  vblank ${vInst.toFixed(1)}  ` +
              `cpu ${opts.puae_cpu_model}/${opts.puae_cpu_compatibility}  ` +
              `t+${((now - t0) / 1000).toFixed(0)}s  ` +
              `threads:${W.EJS_threads ? "on" : "off"}` +
              (hashOk ? "" : `  <span class="bad">[canvas unreadable]</span>`);
          } else {
            hud.textContent = `booting… t+${((now - t0) / 1000).toFixed(0)}s (isolated:${W.crossOriginIsolated})`;
          }
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      main().catch((e) => (hud.innerHTML = `<span class="bad">error: ${e}</span>`));
    </script>
  </body>
</html>
