# bacon — Rust backend dev runner. `bacon` (TUI) or `bacon --headless -j run`
# (used by `just dev`): auto-reloads on source + .env changes, streaming logs.
# Mirrors the sibling apps (../scribe). The binary loads backend/.env via dotenvy.
default_job = "run"

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false

[jobs.run]
command = ["cargo", "run", "--color", "always"]
need_stdout = true
allow_warnings = true
background = true
on_change_strategy = "kill_then_restart"
watch = [".env"]
