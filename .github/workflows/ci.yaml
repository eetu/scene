name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Which areas changed — so each check runs only when relevant (a Rust-only PR
  # skips the frontend + Playwright checks, a frontend-only PR skips the Rust
  # ones, etc). Same paths-filter pattern as dockerimage.yaml. main has no
  # required status checks, so skipped jobs don't block a merge.
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.f.outputs.frontend }}
      backend: ${{ steps.f.outputs.backend }}
      tracker_stack: ${{ steps.f.outputs.tracker_stack }}
      browser: ${{ steps.f.outputs.browser }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: f
        with:
          filters: |
            frontend:
              - 'packages/**'
              - 'apps/*/frontend/**'
              - 'package.json'
              - 'yarn.lock'
              - '.yarnrc.yml'
              - '.yarn/releases/**'
              - '.node-version'
              - '.prettierignore'
              - '.github/workflows/ci.yaml'
            backend:
              - 'apps/*/backend/**'
              - 'apps/*/e2e/**'
              - 'services/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yaml'
            tracker_stack:
              - 'apps/tracker/backend/**'
              - 'apps/tracker/integration/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yaml'
            browser:
              - 'packages/player/**'
              - 'apps/*/frontend/**'
              - 'package.json'
              - 'yarn.lock'
              - '.yarn/releases/**'
              - '.github/workflows/ci.yaml'

  frontend:
    name: "Frontends (Svelte workspace)"
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
      # Yarn is vendored (.yarn/releases/*.cjs) and invoked via node — no corepack
      # (node 25+ dropped the bundle), so this stays node-version-agnostic and in
      # step with the Dockerfile's node 26 stage. Root scripts fan out across the
      # workspace (foreach), running only workspaces that define each script.
      - name: Frontend checks (all workspaces)
        run: |
          yarn() { node .yarn/releases/yarn-*.cjs "$@"; }
          yarn install --immutable
          yarn lint
          yarn format
          yarn typecheck
          yarn build
          # vitest tiers: node (unit — logic, api layer, the transport machine) +
          # real headless chromium (browser — component render + the Tunnel shader
          # compile, which needs a real WebGL context). Chromium is shared across
          # every browser vitest project, so one install covers the workspace.
          yarn workspace tracker-frontend exec playwright install --with-deps chromium
          yarn test

  backend:
    name: "Backends (Rust workspace)"
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "."
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --workspace --release

  integration:
    name: "Integration (tracker stack: real backend + HTTP)"
    needs: changes
    if: ${{ needs.changes.outputs.tracker_stack == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "."
      # tracker-integration boots the REAL backend (DEV_AUTH + temp data dir +
      # fixtures) and drives it over real HTTP, wiremocking only the external
      # upstream. #[ignore]d so the backend job skips it; run it explicitly here.
      - run: cargo build -p tracker-backend
      - run: cargo test -p tracker-integration -- --ignored --nocapture

  browser-e2e:
    name: "Browser E2E (${{ matrix.app }} playback)"
    needs: changes
    if: ${{ needs.changes.outputs.browser == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [tracker, party]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
      # Real built SPA + the real vendored libopenmpt worklet in a headless
      # browser, backend mocked (each app's frontend/e2e + @scene/player's shared
      # playback-smoke). This is the guard that would have caught the emsdk-6
      # resizable-ArrayBuffer regression a node gate waved through. Chromium only
      # in CI (reliable headless WebAudio; the bug reproduced there). WebKit stays
      # a local check (`just e2e <app>`) pending Linux-CI vetting.
      - name: Playwright playback smoke
        run: |
          yarn() { node .yarn/releases/yarn-*.cjs "$@"; }
          yarn install --immutable
          yarn workspace ${{ matrix.app }}-frontend exec playwright install --with-deps chromium
          yarn workspace ${{ matrix.app }}-frontend test:e2e --project=chromium

  # Single stable check to require in branch protection. Always runs (no path
  # filter), so it always reports — sidestepping the "required check never
  # reports and blocks the PR forever" trap. Passes when every needed job
  # succeeded OR was skipped by its path filter; fails only when one actually
  # failed/was cancelled. Require THIS job (not the filtered jobs by name, which
  # for the browser-e2e matrix don't report reliable per-leg names when skipped).
  ci-gate:
    name: "CI gate"
    needs: [changes, frontend, backend, integration, browser-e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs passed or were skipped
        run: |
          echo "job results: ${{ join(needs.*.result, ' ') }}"
          for r in ${{ join(needs.*.result, ' ') }}; do
            case "$r" in
              failure|cancelled)
                echo "::error::a required job reported '$r'"; exit 1 ;;
            esac
          done
          echo "ok"
