name: Create and publish Docker images

# One image per service, built from the monorepo root Dockerfile via --target.
# Each matrix leg gates on its own paths so an unrelated change doesn't rebuild
# everything. Images: ghcr.io/<owner>/scene-{tracker,party,transcoder}.
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [tracker, party, transcoder]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect build-relevant changes
        id: changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            tracker:
              - 'apps/tracker/**'
              - 'packages/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'yarn.lock'
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/dockerimage.yaml'
            party:
              - 'apps/party/**'
              - 'packages/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'yarn.lock'
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/dockerimage.yaml'
            transcoder:
              - 'services/transcoder/**'
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/dockerimage.yaml'

      - name: Decide whether to build this service
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] \
             || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=${{ steps.changes.outputs[matrix.service] }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.gate.outputs.build == 'true'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: "arm64"

      - name: Set up Docker Buildx
        if: steps.gate.outputs.build == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to the Container registry
        if: steps.gate.outputs.build == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: steps.gate.outputs.build == 'true'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push ${{ matrix.service }} image
        if: steps.gate.outputs.build == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: ${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          # Skip provenance + SBOM: each becomes its own GHCR "version", inflating
          # the package version count for no benefit. (invinite pulls the amd64
          # leg via the normal CI tags; the Pi deploy pulls arm64 — one multi-arch
          # tag serves both.)
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Prune untagged image versions
        if: steps.gate.outputs.build == 'true'
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: scene-${{ matrix.service }}
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 5
