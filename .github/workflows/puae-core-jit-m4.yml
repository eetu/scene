name: Build PUAE core (JIT M4 — baked, threaded-ready)

# M4 = M3 C-dispatch/chaining scaffold (m3-jit-scaffold.py) + the JIT recompiler
# BAKED into the core as --post-js (core/ejs-jit/bundle.mjs → ejs-jit.js), so it
# self-installs Module.ejsJitGet on whatever thread the m68k loop runs — making
# the JIT work with the THREADED core (which mounts HDF demos) as well as the
# non-threaded one, with no page-side harness. Native amd64.

on:
  workflow_dispatch:
  push:
    branches: [party-puae-wasm-jit]
    paths:
      - ".github/workflows/puae-core-jit-m4.yml"
      - "emulators/puae-wasm/core/patches/m3-*.py"
      - "emulators/puae-wasm/core/patches/m4-*.py"
      - "emulators/puae-wasm/core/ejs-jit/**"
      - "emulators/puae-wasm/jit/**"
      - "emulators/puae-wasm/spike/emit.mjs"

jobs:
  build-puae-jit-m4:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl gpg p7zip-full binutils-mips-linux-gnu \
            build-essential pkgconf python3 git zip libsdl2-dev jq

      - name: Set up emsdk 3.1.74
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk && ./emsdk install 3.1.74 && ./emsdk activate 3.1.74

      - name: Bundle the JIT recompiler (→ ejs-jit.js)
        run: |
          node emulators/puae-wasm/core/ejs-jit/bundle.mjs
          node --check emulators/puae-wasm/core/ejs-jit/ejs-jit.js
          ls -l emulators/puae-wasm/core/ejs-jit/ejs-jit.js

      - name: Clone EmulatorJS/build + stage patches
        run: |
          git clone --depth 1 https://github.com/EmulatorJS/build.git
          cp emulators/puae-wasm/core/patches/m1-makefile.py build/m1-makefile.py
          cp emulators/puae-wasm/core/patches/m4-postjs.py build/m4-postjs.py
          cp emulators/puae-wasm/core/ejs-jit/ejs-jit.js build/ejs-jit.js

      - name: Inject Makefile patches into build.sh (before RetroArch link)
        run: |
          python3 - <<'PY'
          p = "build/build.sh"
          s = open(p).read()
          anchor = 'cd "$buildPath/RetroArch/emulatorjs"'
          assert anchor in s, "build.sh link anchor not found"
          # copy the bundle next to the Makefile, patch link flags (table growth +
          # exports) then add --post-js pointing at the absolute bundle path.
          ins = (
              'cp "$initialPath/ejs-jit.js" "$buildPath/RetroArch/emulatorjs/ejs-jit.js"\n\t\t'
              'python3 "$initialPath/m1-makefile.py" "$buildPath/RetroArch/Makefile.emulatorjs"\n\t\t'
              'python3 "$initialPath/m4-postjs.py" "$buildPath/RetroArch/Makefile.emulatorjs" "$buildPath/RetroArch/emulatorjs/ejs-jit.js"\n\t\t'
          )
          s = s.replace(anchor, ins + anchor, 1)
          open(p, "w").write(s)
          print("build.sh patches injected")
          PY

      - name: Clone + patch libretro-uae (M3 dispatch+chaining)
        run: |
          mkdir -p build/compile
          git clone --recurse-submodules https://github.com/EmulatorJS/libretro-uae.git build/compile/puae
          python3 emulators/puae-wasm/core/patches/m3-jit-scaffold.py build/compile/puae/sources/src/newcpu.c
          grep -n 'ejs_jit_obtain\|jit_insn_total' build/compile/puae/sources/src/newcpu.c | head

      - name: Build patched puae core
        run: |
          source emsdk/emsdk_env.sh
          cd build && bash build.sh --core=puae

      - name: Verify link flags + post-js took
        run: |
          find build/output -type f | sort
          echo "=== post-js / table growth in Makefile ==="
          grep -c 'post-js' build/compile/RetroArch/Makefile.emulatorjs || true
          grep -c ALLOW_TABLE_GROWTH build/compile/RetroArch/Makefile.emulatorjs || true

      - name: Upload M4 core
        uses: actions/upload-artifact@v4
        with:
          name: puae-wasm-jit-m4
          path: |
            build/output/*.data
            build/output/reports/puae.json
          if-no-files-found: error
