name: Build PUAE core (JIT M1)

# Builds the JIT-scaffolding core (M1): clones EmulatorJS/libretro-uae, applies
# m1-jit-scaffold.py (EM_JS delegator hook in m68k_run_2_020 + ABI/memory exports),
# and injects m1-makefile.py into build.sh so RetroArch's link gets
# -sALLOW_TABLE_GROWTH + wasmTable/wasmMemory. The hook returns -1 until the
# harness defines Module.ejsJitGet, so the core boots at baseline; the recompiler
# is then iterated at runtime with NO further core rebuilds. Native amd64.

on:
  workflow_dispatch:
  push:
    branches: [party-puae-wasm-jit]
    paths:
      - ".github/workflows/puae-core-jit.yml"
      - "emulators/puae-wasm/core/patches/m1-*.py"

jobs:
  build-puae-jit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl gpg p7zip-full binutils-mips-linux-gnu \
            build-essential pkgconf python3 git zip libsdl2-dev jq

      - name: Set up emsdk 3.1.74
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk && ./emsdk install 3.1.74 && ./emsdk activate 3.1.74

      - name: Clone EmulatorJS/build + stage patches
        run: |
          git clone --depth 1 https://github.com/EmulatorJS/build.git
          cp emulators/puae-wasm/core/patches/m1-makefile.py build/m1-makefile.py

      - name: Inject Makefile link patch into build.sh (runs before RetroArch link)
        run: |
          python3 - <<'PY'
          p = "build/build.sh"
          s = open(p).read()
          anchor = 'cd "$buildPath/RetroArch/emulatorjs"'
          assert anchor in s, "build.sh link anchor not found"
          ins = 'python3 "$initialPath/m1-makefile.py" "$buildPath/RetroArch/Makefile.emulatorjs"\n\t\t'
          s = s.replace(anchor, ins + anchor, 1)
          open(p, "w").write(s)
          print("build.sh link patch injected")
          PY

      - name: Clone + patch libretro-uae (M1 scaffold)
        run: |
          mkdir -p build/compile
          git clone --recurse-submodules https://github.com/EmulatorJS/libretro-uae.git build/compile/puae
          python3 emulators/puae-wasm/core/patches/m1-jit-scaffold.py build/compile/puae/sources/src/newcpu.c
          echo "=== hook markers ==="; grep -n 'ejs_jit_get\|jit_get_long' build/compile/puae/sources/src/newcpu.c | head

      - name: Build patched puae core
        run: |
          source emsdk/emsdk_env.sh
          cd build && bash build.sh --core=puae

      - name: List outputs + verify link flags took
        run: |
          find build/output -type f | sort
          echo "=== ALLOW_TABLE_GROWTH in Makefile? ==="
          grep -c ALLOW_TABLE_GROWTH build/compile/RetroArch/Makefile.emulatorjs || true

      - name: Upload M1 core
        uses: actions/upload-artifact@v4
        with:
          name: puae-wasm-jit-m1
          path: |
            build/output/*.data
            build/output/reports/puae.json
          if-no-files-found: error
