name: Build PUAE core (WASM)

# Builds the EmulatorJS PUAE (Amiga) core to WASM on a NATIVE amd64 runner.
# We can't build it locally on Apple Silicon: amd64 emscripten under qemu-TCG
# deterministically deadlocks at the final JS link (the wasm compiles fine, then
# hangs at 0% CPU). ubuntu-latest is native amd64 with 16 GB RAM, so it runs the
# exact same EmulatorJS/build flow cleanly and uploads the core as an artifact.
#
# Runs on push to the branch when the workflow or core build files change (a
# branch-only workflow can't use workflow_dispatch — that needs the file on the
# default branch). workflow_dispatch is kept for once this lands on main.

on:
  workflow_dispatch:
  push:
    branches: [party-puae-wasm-jit]
    paths:
      - ".github/workflows/puae-core.yml"
      - "emulators/puae-wasm/core/**"

jobs:
  build-puae:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl gpg p7zip-full binutils-mips-linux-gnu \
            build-essential pkgconf python3 git zip libsdl2-dev jq

      - name: Set up emsdk 3.1.74 (EmulatorJS's pinned toolchain)
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install 3.1.74
          ./emsdk activate 3.1.74

      - name: Clone EmulatorJS/build
        run: git clone --depth 1 https://github.com/EmulatorJS/build.git

      - name: Build puae core
        run: |
          source emsdk/emsdk_env.sh
          emcc --version | head -1
          cd build
          bash build.sh --core=puae

      - name: List outputs
        run: |
          echo "=== build/output ==="
          find build/output -type f | sort
          echo "=== sizes ==="
          ls -la build/output/*.data || true

      - name: Upload puae core
        uses: actions/upload-artifact@v4
        with:
          name: puae-wasm-core
          path: |
            build/output/*.data
            build/output/reports/puae.json
            build/output/logs/puae-*.log
          if-no-files-found: error
